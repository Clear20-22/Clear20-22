<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>p5.js Visual by Clear20-22</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #0d1117;
      overflow: hidden;
      font-family: Inter, system-ui, Arial, sans-serif;
    }
    #overlay {
      position: fixed;
      top: 20px;
      left: 20px;
      color: #c9d1d9;
      background: rgba(22, 27, 34, 0.6);
      border: 1px solid rgba(88, 166, 255, 0.35);
      border-radius: 12px;
      padding: 12px 14px;
      backdrop-filter: blur(6px);
      z-index: 10;
    }
    #overlay h1 {
      margin: 0 0 6px;
      font-size: 16px;
      color: #58a6ff;
    }
    #overlay p {
      margin: 0;
      font-size: 12px;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div id="overlay">
    <h1>Jubayer Ahmed Sojib</h1>
    <p>Interactive p5.js creative coding scene</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.3/lib/p5.min.js"></script>
  <script src="./sketch.js"></script>
</body>
</html>
